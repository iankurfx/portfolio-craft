kind = "web"
previewPath = "/"
title = "Ankur Studio Portfolio"
version = "1.0.0"
id = "artifacts/ankur-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25277
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ankur-studio run dev"

[services.env]
PORT = "25277"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ankur-studio", "run", "build"]
publicDir = "artifacts/ankur-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
